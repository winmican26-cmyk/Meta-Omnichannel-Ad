<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" role="img" aria-label="Elegant businesswoman in a tailored office suit reading a dynamic performance graph">
  <defs>
    <linearGradient id="bgPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07172a"/>
      <stop offset="54%" stop-color="#0b2138"/>
      <stop offset="100%" stop-color="#102d48"/>
    </linearGradient>
    <linearGradient id="panelGlass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14365a" stop-opacity="0.86"/>
      <stop offset="100%" stop-color="#071c31" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#007bff"/>
      <stop offset="55%" stop-color="#11b8ff"/>
      <stop offset="100%" stop-color="#22f3ff"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5cffb0"/>
      <stop offset="48%" stop-color="#00f5ff"/>
      <stop offset="100%" stop-color="#2d7dff"/>
    </linearGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#241103"/>
      <stop offset="48%" stop-color="#563013"/>
      <stop offset="100%" stop-color="#8b5a2b"/>
    </linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd8bd"/>
